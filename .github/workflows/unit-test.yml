name: Unit Tests

on: push

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install
      
      - name: Run tests
        run: npm test
      
      #- name: Generate coverage report
      #  run: npm run test:coverage